<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 서비스</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; word-break: keep-all; }
        
        /* [모바일 달력 크기 최적화] */
        #calendar { 
            max-width: 950px; 
            margin: 10px auto; 
            padding: 5px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }

        /* 캘린더 내부 모바일 폰트 조정 */
        .fc { font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 800; }
        .fc .fc-button { padding: 6px 10px !important; font-size: 0.75rem !important; font-weight: 700; }

        /* 일정 공통 스타일 */
        .fc-event { 
            cursor: pointer; 
            border: none !important; 
            padding: 4px 6px !important; 
            border-radius: 6px !important; 
            font-weight: 700; 
            margin-bottom: 2px; 
            display: block !important; 
        }
        .fc-event-time { display: none !important; }

        /* [모달창 모바일 최적화] */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .modal-content { 
            background: white; 
            margin: 15% auto; 
            padding: 24px; 
            border-radius: 28px; 
            width: 92%; 
            max-width: 450px; 
            position: relative; 
            animation: modal-in 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes modal-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 모바일용 인풋/버튼 크기 확대 (터치 편의성) */
        input, select, textarea, button { font-size: 16px !important; } /* iOS 자동 줌 방지 */
        .btn-large { padding: 16px; border-radius: 18px; font-weight: 700; }

        /* 시험범위 과목 카드 */
        .subject-card { 
            background: white; 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 10px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            border: 1px solid #f1f5f9;
        }

        .event-item { border-left: 5px solid #3b82f6; transition: 0.2s; }
        body.admin-mode .event-item:active { background: #fff1f2; border-left-color: #ef4444; }

        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        @media (max-width: 480px) {
            #calendar { margin: 5px; border-radius: 8px; }
            .fc-header-toolbar { display: flex; flex-direction: column; gap: 8px; }
            .modal-content { margin: 25% auto; padding: 20px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-5 sticky top-0 z-50">
        <h1 class="text-lg font-black text-blue-600 tracking-tight">📅 함지 3-7</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold transition-all">관리자 인증</button>
    </nav>

    <div id="calendar"></div>

    <div class="max-w-[950px] mx-auto px-4 mb-6">
        <button onclick="toggleSubjectList()" class="w-full bg-blue-600 text-white btn-large shadow-xl shadow-blue-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
            📖 시험범위 조회
        </button>
    </div>

    <div id="subjectListArea" class="max-w-[950px] mx-auto px-4 hidden">
        <div id="subjectGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <div id="editEventModal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-slate-900 mb-5">일정 수정</h2>
            <div class="space-y-4">
                <input type="text" id="editEventTitle" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-2">
                    <select id="editEventType" onchange="toggleEditTimeInput()" class="p-4 rounded-2xl border border-slate-200 bg-white">
                        <option value="1">🔵 행사</option>
                        <option value="2">🔴 마감</option>
                    </select>
                    <input type="date" id="editEventDate" class="p-4 rounded-2xl border border-slate-200">
                </div>
                <div id="editTimeInputGroup" style="display:none;">
                    <input type="time" id="editEventTime" class="w-full p-4 rounded-2xl border border-slate-200">
                </div>
            </div>
            <div class="mt-8 flex gap-2">
                <button onclick="closeModal('editEventModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold text-slate-500">취소</button>
                <button id="updateEventBtn" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">수정 완료</button>
            </div>
        </div>
    </div>

    <div id="editRangeModal" class="modal">
        <div class="modal-content">
            <h2 id="editSubjectTitle" class="text-xl font-bold mb-4">과목 수정</h2>
            <textarea id="rangeInput" class="w-full h-48 p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 whitespace-pre-wrap leading-relaxed" placeholder="시험범위를 입력하세요..."></textarea>
            <div class="mt-6 flex gap-2">
                <button onclick="closeModal('editRangeModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold">취소</button>
                <button id="saveRangeBtn" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">저장</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal('viewModal')" class="absolute top-5 right-5 text-slate-400 text-2xl">✕</button>
            <h2 id="viewDateTitle" class="text-sm font-bold text-slate-400 mb-1">날짜</h2>
            <h3 class="text-2xl font-black text-slate-900 mb-6">상세 일정</h3>
            <div id="eventList" class="space-y-3 max-h-[45vh] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div id="authModal" class="modal"><div id="authContent" class="modal-content text-center"><h2 class="text-xl font-bold mb-4 text-slate-900">관리자 로그인</h2><input type="password" id="serialInput" placeholder="인증번호" class="w-full p-4 rounded-2xl border border-slate-200 mb-4 text-center text-2xl tracking-widest outline-none focus:ring-2 focus:ring-blue-500"><div class="flex gap-2"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">확인</button></div></div></div>
    <div id="addModal" class="modal"><div class="modal-content"><h2 class="text-xl font-bold mb-5">새 일정</h2><div class="space-y-4"><input type="text" id="eventTitle" placeholder="일정 이름" class="w-full p-4 rounded-2xl border border-slate-200"><div class="grid grid-cols-2 gap-2"><select id="eventType" onchange="toggleTimeInput()" class="p-4 rounded-2xl border border-slate-200 bg-white"><option value="1">🔵 행사</option><option value="2">🔴 마감</option></select><input type="date" id="eventDate" class="p-4 rounded-2xl border border-slate-200"></div><div id="timeInputGroup" style="display:none;"><input type="time" id="eventTime" class="w-full p-4 rounded-2xl border border-slate-200"></div></div><div class="mt-8 flex gap-2"><button onclick="closeModal('addModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold">취소</button><button onclick="handleAddEvent()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">저장</button></div></div></div>
    <div id="confirmDeleteModal" class="modal" style="z-index: 11000;"><div class="modal-content text-center border-t-8 border-red-500"><h2 class="text-xl font-bold mb-2">삭제할까요?</h2><p id="deleteTargetTitle" class="text-slate-500 text-sm mb-8"></p><div class="flex gap-2"><button onclick="closeModal('confirmDeleteModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold">유지</button><button id="finalDeleteBtn" class="flex-1 bg-red-600 text-white p-4 rounded-2xl font-bold">삭제</button></div></div></div>
    <div id="viewRangeModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewRangeModal')" class="absolute top-5 right-5 text-slate-400 text-2xl">✕</button><h3 id="targetSubjectName" class="text-2xl font-black text-slate-900 mb-6 uppercase">과목명</h3><div id="rangeDisplay" class="bg-slate-50 p-6 rounded-2xl min-h-[150px] whitespace-pre-wrap leading-relaxed text-slate-700 font-medium"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc", authDomain: "hamji-calendar.firebaseapp.com", projectId: "hamji-calendar", storageBucket: "hamji-calendar.firebasestorage.app", messagingSenderId: "28553121023", appId: "1:28553121023:web:4fa03b998a1469408510ca", measurementId: "G-E4CPF0REFB" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");
        const rangeCol = collection(db, "test_ranges");

        const MASTER_SERIAL = "0307";
        const SUBJECTS = ["국어", "수학", "영어", "한국사", "통합과학", "통합사회", "기술가정", "정보"];
        let allEvents = [];
        let rangeData = {};

        window.openModal = (id) => { document.getElementById(id).style.display = 'block'; document.body.style.overflow = 'hidden'; };
        window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; };

        window.toggleSubjectList = () => {
            const area = document.getElementById('subjectListArea');
            area.classList.toggle('hidden');
            if(!area.classList.contains('hidden')) area.scrollIntoView({ behavior: 'smooth' });
        };

        function renderSubjects() {
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = "";
            SUBJECTS.forEach(sub => {
                const card = document.createElement('div');
                card.className = "subject-card flex justify-between items-center active:scale-95 transition-all";
                card.innerHTML = `<span class="text-lg font-bold text-slate-700">${sub}</span><span class="text-xs font-bold text-blue-500 bg-blue-50 px-4 py-2 rounded-xl">조회</span>`;
                card.onclick = () => {
                    document.getElementById('targetSubjectName').innerText = sub;
                    document.getElementById('rangeDisplay').innerText = rangeData[sub] || "등록된 범위가 없습니다.";
                    openModal('viewRangeModal');
                };
                
                const handleLongPress = (e) => {
                    if(!document.body.classList.contains('admin-mode')) return;
                    e.preventDefault();
                    document.getElementById('editSubjectTitle').innerText = `${sub} 수정`;
                    document.getElementById('rangeInput').value = rangeData[sub] || "";
                    document.getElementById('saveRangeBtn').onclick = async () => {
                        await setDoc(doc(db, "test_ranges", sub), { content: document.getElementById('rangeInput').value });
                        closeModal('editRangeModal');
                    };
                    openModal('editRangeModal');
                };
                card.oncontextmenu = handleLongPress;
                let t; card.ontouchstart = () => t = setTimeout(() => handleLongPress(new Event('long')), 600); card.ontouchend = () => clearTimeout(t);
                grid.appendChild(card);
            });
        }

        window.openEditModal = (ev) => {
            if(!document.body.classList.contains('admin-mode')) return;
            document.getElementById('editEventTitle').value = ev.rawTitle || ev.title;
            document.getElementById('editEventType').value = ev.type;
            document.getElementById('editEventDate').value = ev.start.split('T')[0];
            document.getElementById('editEventTime').value = ev.time || "";
            document.getElementById('editTimeInputGroup').style.display = ev.type === "2" ? "block" : "none";
            document.getElementById('updateEventBtn').onclick = async () => {
                const nt = document.getElementById('editEventTitle').value;
                const nty = document.getElementById('editEventType').value;
                const nd = document.getElementById('editEventDate').value;
                const ntm = document.getElementById('editEventTime').value;
                let up = { rawTitle: nt, title: nt, type: nty, start: nd, time: ntm, allDay: nty !== "2", backgroundColor: nty === "2" ? "#ef4444" : "#3b82f6" };
                if(nty === "2" && ntm) up.start = `${nd}T${ntm}:00`;
                await updateDoc(doc(db, "events", ev.id), up);
                closeModal('editEventModal'); closeModal('viewModal');
            };
            openModal('editEventModal');
        };

        function renderEventItems(dateStr) {
            const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
            const listEl = document.getElementById('eventList');
            listEl.innerHTML = dayEvents.length ? "" : "<p class='text-slate-400 py-10 text-center font-medium'>일정이 없습니다.</p>";
            dayEvents.forEach(ev => {
                const item = document.createElement('div');
                item.className = "event-item p-4 bg-slate-50 rounded-2xl mb-3 active:scale-95 transition-all";
                const displayTime = (ev.type === "2" && ev.time) ? `~${ev.time}` : "종일";
                item.innerHTML = `<div class="flex justify-between items-center"><div class="flex-1 pr-2"><h4 class="text-lg font-bold text-slate-800">${ev.rawTitle || ev.title}</h4><p class="text-xs font-semibold text-slate-400 mt-1 uppercase">${displayTime}</p></div><span class="text-[10px] font-black px-2 py-1 bg-white rounded-lg border border-slate-100 shadow-sm">${ev.type === "2" ? "🔴 마감" : "🔵 행사"}</span></div>`;
                item.onclick = () => { if(document.body.classList.contains('admin-mode')) requestDelete(ev.id, ev.rawTitle || ev.title); };
                const h = (e) => { e.preventDefault(); e.stopPropagation(); openEditModal(ev); };
                item.oncontextmenu = h;
                let t; item.ontouchstart = () => t = setTimeout(() => h(new Event('long')), 600); item.ontouchend = () => clearTimeout(t);
                listEl.appendChild(item);
            });
        }

        // 기존 캘린더/Firebase 로직 통합
        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                dayMaxEvents: true, displayEventTime: false,
                dateClick: (info) => { document.getElementById('viewDateTitle').innerText = info.dateStr; renderEventItems(info.dateStr); openModal('viewModal'); },
                eventClick: (info) => { info.jsEvent.preventDefault(); calendar.trigger('dateClick', { dateStr: info.event.startStr.split('T')[0] }); }
            });
            calendar.render();
            onSnapshot(eventCol, (s) => { 
                allEvents = s.docs.map(d => ({ id: d.id, ...d.data() }));
                calendar.removeAllEvents(); calendar.addEventSource(allEvents.map(ev => ({ ...ev, display: 'block', backgroundColor: ev.type === "2" ? "#ef4444" : "#3b82f6", textColor: "#ffffff" }))); 
                if(document.getElementById('viewModal').style.display === 'block') renderEventItems(document.getElementById('viewDateTitle').innerText);
            });
            onSnapshot(rangeCol, (s) => { s.docs.forEach(d => rangeData[d.id] = d.data().content); renderSubjects(); });
        });

        window.toggleTimeInput = () => document.getElementById('timeInputGroup').style.display = document.getElementById('eventType').value === "2" ? "block" : "none";
        window.toggleEditTimeInput = () => document.getElementById('editTimeInputGroup').style.display = document.getElementById('editEventType').value === "2" ? "block" : "none";
        window.handleAuth = () => { const i = document.getElementById('serialInput'); if(i.value === MASTER_SERIAL) { document.body.classList.add('admin-mode'); document.getElementById('authBtn').innerText = "관리 모드 ✅"; closeModal('authModal'); renderSubjects(); } else { document.getElementById('authContent').classList.add('shake'); setTimeout(() => document.getElementById('authContent').classList.remove('shake'), 400); i.value = ""; } };
        window.handleAddEvent = async () => { /* 등록 로직... */ const t = document.getElementById('eventTitle').value; const ty = document.getElementById('eventType').value; const d = document.getElementById('eventDate').value; const tm = document.getElementById('eventTime').value; if(!t || !d) return; let ed = { rawTitle: t, title: t, start: d, allDay: ty !== "2", type: ty, time: tm || "", backgroundColor: ty === "2" ? "#ef4444" : "#3b82f6", textColor: "#ffffff" }; if(ty === "2" && tm) ed.start = `${d}T${tm}:00`; await addDoc(eventCol, ed); closeModal('addModal'); document.getElementById('eventTitle').value = ""; };
        window.requestDelete = (id, title) => { document.getElementById('deleteTargetTitle').innerText = `"${title}"`; document.getElementById('finalDeleteBtn').onclick = async () => { await deleteDoc(doc(db, "events", id)); closeModal('confirmDeleteModal'); closeModal('viewModal'); }; openModal('confirmDeleteModal'); };
    </script>
</body>
</html>
