<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 서비스</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* [UI 최적화] 달력 외곽 여백 조정 */
        #calendar { max-width: 950px; margin: 10px auto; padding: 5px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* [UI 최적화] 일정 바 크기 및 폰트 축소 */
        .fc-event { cursor: pointer; border: none !important; padding: 2px 4px !important; font-size: 0.75rem !important; border-radius: 4px !important; font-weight: 600; color: white !important; margin-bottom: 1px; display: block !important; opacity: 1 !important; }
        .fc-event-time { display: none !important; }
        .fc-event-title { color: white !important; font-weight: 700 !important; }

        /* [UI 최적화] 캘린더 내부 텍스트 및 버튼 크기 조정 */
        .fc .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 800; }
        .fc .fc-button { padding: 4px 8px !important; font-size: 0.75rem !important; font-weight: 700 !important; }
        .fc-daygrid-day-number { font-size: 0.8rem !important; padding: 4px !important; }
        .fc-col-header-cell-cushion { font-size: 0.8rem !important; }

        /* 모바일 전용 미세 조정 (화면이 좁아질 때) */
        @media (max-width: 640px) {
            .fc-toolbar { flex-direction: column; gap: 8px; }
            .fc-toolbar-chunk { display: flex; justify-content: center; }
            .fc-header-toolbar { margin-bottom: 10px !important; }
        }

        .subject-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.2s; border: 1px solid #f1f5f9; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 12% auto; padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; animation: modal-in 0.25s ease-out; }
        @keyframes modal-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .event-item { transition: all 0.2s; border-left: 4px solid #3b82f6; cursor: pointer; position: relative; }
        body.admin-mode .event-item:hover { border-left-color: #ef4444; background: #fff1f2; }
        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600">📅 함지 3-7</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-all">관리자 인증</button>
    </nav>

    <div id="calendar"></div>

    <div id="editEventModal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-slate-900 mb-5 tracking-tight">일정 수정하기</h2>
            <div class="space-y-4">
                <input type="text" id="editEventTitle" placeholder="일정 이름" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-2">
                    <select id="editEventType" onchange="toggleEditTimeInput()" class="p-3 rounded-xl border border-slate-200 bg-white">
                        <option value="1">🔵 일반 행사</option>
                        <option value="2">🔴 마감 기한</option>
                    </select>
                    <input type="date" id="editEventDate" class="p-3 rounded-xl border border-slate-200">
                </div>
                <div id="editTimeInputGroup" style="display:none;">
                    <input type="time" id="editEventTime" class="w-full p-3 rounded-xl border border-slate-200">
                </div>
            </div>
            <div class="mt-8 flex gap-2">
                <button onclick="closeModal('editEventModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">취소</button>
                <button id="updateEventBtn" class="flex-2 bg-blue-600 text-white p-3 rounded-xl font-bold">수정 완료</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal"><div id="authContent" class="modal-content text-center"><h2 class="text-xl font-bold mb-4 text-slate-900">관리자 로그인</h2><input type="password" id="serialInput" placeholder="인증번호 입력" class="w-full p-4 rounded-2xl border border-slate-200 mb-4 text-center text-xl tracking-widest outline-none focus:ring-2 focus:ring-blue-500 transition-all"><div class="flex gap-2"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold text-slate-500">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">확인</button></div></div></div>
    <div id="viewModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewModal')" class="absolute top-4 right-4 p-2 text-slate-400 text-2xl">✕</button><h2 id="viewDateTitle" class="text-lg font-bold text-slate-400 mb-1">날짜</h2><h3 class="text-2xl font-black text-slate-900 mb-6 uppercase">상세 일정</h3><div id="eventList" class="space-y-3 max-h-[400px] overflow-y-auto pr-1"></div></div></div>
    <div id="addModal" class="modal"><div class="modal-content"><h2 class="text-xl font-bold text-slate-900 mb-5 tracking-tight">새 일정 만들기</h2><div class="space-y-4"><input type="text" id="eventTitle" placeholder="일정 이름" class="w-full p-3 rounded-xl border border-slate-200 outline-none"><div class="grid grid-cols-2 gap-2"><select id="eventType" onchange="toggleTimeInput()" class="p-3 rounded-xl border border-slate-200 bg-white"><option value="1">🔵 일반 행사</option><option value="2">🔴 마감 기한</option></select><input type="date" id="eventDate" class="p-3 rounded-xl border border-slate-200"></div><div id="timeInputGroup" style="display:none;"><input type="time" id="eventTime" class="w-full p-3 rounded-xl border border-slate-200"></div></div><div class="mt-8 flex gap-2"><button onclick="closeModal('addModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">취소</button><button onclick="handleAddEvent()" class="flex-2 bg-blue-600 text-white p-3 rounded-xl font-bold">일정 저장</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc", authDomain: "hamji-calendar.firebaseapp.com", projectId: "hamji-calendar", storageBucket: "hamji-calendar.firebasestorage.app", messagingSenderId: "28553121023", appId: "1:28553121023:web:4fa03b998a1469408510ca", measurementId: "G-E4CPF0REFB" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");

        const MASTER_SERIAL = "0307";
        let allEvents = [];

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.toggleEditTimeInput = () => {
            const type = document.getElementById('editEventType').value;
            document.getElementById('editTimeInputGroup').style.display = type === "2" ? "block" : "none";
        };

        window.openEditModal = (ev) => {
            if(!document.body.classList.contains('admin-mode')) return;
            document.getElementById('editEventTitle').value = ev.rawTitle || ev.title;
            document.getElementById('editEventType').value = ev.type;
            document.getElementById('editEventDate').value = ev.start.split('T')[0];
            document.getElementById('editEventTime').value = ev.time || "";
            window.toggleEditTimeInput();
            document.getElementById('updateEventBtn').onclick = async () => {
                const newTitle = document.getElementById('editEventTitle').value;
                const newType = document.getElementById('editEventType').value;
                const newDate = document.getElementById('editEventDate').value;
                const newTime = document.getElementById('editEventTime').value;
                let updateData = { rawTitle: newTitle, title: newTitle, type: newType, start: newDate, time: newTime, allDay: newType !== "2", backgroundColor: newType === "2" ? "#ef4444" : "#3b82f6" };
                if(newType === "2" && newTime) updateData.start = `${newDate}T${newTime}:00`;
                await updateDoc(doc(db, "events", ev.id), updateData);
                closeModal('editEventModal');
                closeModal('viewModal');
            };
            openModal('editEventModal');
        };

        function renderEventItems(dateStr) {
            const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
            const listEl = document.getElementById('eventList');
            listEl.innerHTML = dayEvents.length ? "" : "<p class='text-slate-400 py-10 text-center font-medium'>일정이 없습니다.</p>";
            dayEvents.forEach(ev => {
                const item = document.createElement('div');
                item.className = "event-item p-4 bg-slate-50 rounded-2xl mb-2 hover:shadow-md transition-all";
                const tag = ev.type === "2" ? "🔴 마감" : "🔵 행사";
                const displayTime = (ev.type === "2" && ev.time) ? `~${ev.time}` : "종일";
                item.innerHTML = `<div class="flex justify-between items-start"><div class="flex-1 pr-2"><h4 class="text-lg font-bold text-slate-800 leading-tight">${ev.rawTitle || ev.title}</h4><p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-wider">${displayTime}</p></div><span class="shrink-0 text-[10px] font-black px-2 py-1 bg-white rounded-lg border border-slate-100 shadow-sm">${tag}</span></div>`;
                item.onclick = () => { if(document.body.classList.contains('admin-mode')) { requestDelete(ev.id, ev.rawTitle || ev.title); } };
                const handleUpdateAction = (e) => { e.preventDefault(); e.stopPropagation(); openEditModal(ev); };
                item.oncontextmenu = handleUpdateAction;
                let holdTimer;
                item.ontouchstart = () => { holdTimer = setTimeout(() => handleUpdateAction(new Event('hold')), 600); };
                item.ontouchend = () => clearTimeout(holdTimer);
                listEl.appendChild(item);
            });
        }

        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                dayMaxEvents: 2, // [UI 최적화] 모바일에서 칸 늘어짐 방지
                displayEventTime: false,
                contentHeight: 'auto', // [UI 최적화] 불필요한 스크롤 방지
                dateClick: (info) => {
                    document.getElementById('viewDateTitle').innerText = info.dateStr;
                    renderEventItems(info.dateStr);
                    openModal('viewModal');
                },
                eventClick: (info) => {
                    info.jsEvent.preventDefault();
                    calendar.trigger('dateClick', { dateStr: info.event.startStr.split('T')[0] });
                }
            });
            calendar.render();

            onSnapshot(eventCol, (snapshot) => { 
                allEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                calendar.removeAllEvents();
                calendar.addEventSource(allEvents.map(ev => ({ ...ev, display: 'block', backgroundColor: ev.type === "2" ? "#ef4444" : "#3b82f6", textColor: "#ffffff" }))); 
                const openDate = document.getElementById('viewDateTitle').innerText;
                if(document.getElementById('viewModal').style.display === 'block') { renderEventItems(openDate); }
            });
        });

        // 나머지 로직 동일
        window.requestDelete = async (id, title) => { if(confirm(`${title} 일정을 삭제하시겠습니까?`)) { await deleteDoc(doc(db, "events", id)); closeModal('viewModal'); } };
        window.handleAddEvent = async () => { /* 등록 로직 */ };
        window.handleAuth = () => { /* 인증 로직 */ };
    </script>
</body>
</html>
