<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 일정</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        #calendar { max-width: 950px; margin: 20px auto; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* 일정 공통 스타일 */
        .fc-event { cursor: pointer; border: none !important; padding: 4px 8px !important; font-size: 0.85em; border-radius: 8px !important; font-weight: 600; color: white !important; margin-bottom: 2px; display: block !important; opacity: 1 !important; }
        .fc-event-time { display: none !important; }
        
        /* 시험범위 섹션 스타일 */
        .subject-list-container { max-width: 950px; margin: 0 auto 40px auto; }
        .subject-card { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .subject-card:active { transform: scale(0.98); }
        
        /* 텍스트 줄바꿈 유지 */
        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }

        /* 모달 및 공통 스타일 유지 */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 12% auto; padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; animation: modal-in 0.25s ease-out; }
        @keyframes modal-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .mode-hint-container { min-height: 52px; display: flex; align-items: center; justify-content: center; }
        .mode-hint { text-align: center; font-size: 0.85rem; padding: 10px; border-radius: 8px; width: 100%; max-width: 950px; }
        .normal-hint { background-color: #f1f5f9; color: #64748b; display: block; }
        .admin-hint { background-color: #fef2f2; color: #ef4444; display: none; font-weight: bold; border: 1px dashed #fecaca; }
        body.admin-mode .normal-hint { display: none; }
        body.admin-mode .admin-hint { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600">📅 함지 3-7 일정</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-all">관리자 인증</button>
    </nav>

    <div class="px-4 mt-4 mode-hint-container">
        <div class="mode-hint normal-hint">💡 날짜나 일정을 <strong>터치</strong>하여 상세 내용을 확인하세요.</div>
        <div class="mode-hint admin-hint">🛠️ 관리 모드: 일정/시험범위를 <strong>길게 눌러(홀드)</strong> 수정하세요.</div>
    </div>

    <div id="calendar"></div>

    <div class="px-4 subject-list-container">
        <button onclick="toggleSubjectList()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-100 mb-4 transition-transform active:scale-95">
            📖 시험범위 조회
        </button>
        
        <div id="subjectList" class="hidden grid grid-cols-2 md:grid-cols-3 gap-3">
            </div>
    </div>

    <div id="subjectModal" class="modal">
        <div class="modal-content">
            <h2 id="subjectModalTitle" class="text-2xl font-black text-slate-900 mb-2 uppercase">과목명</h2>
            <div id="subjectViewArea">
                <p id="subjectRangeText" class="whitespace-pre-wrap text-slate-600 bg-slate-50 p-4 rounded-xl min-h-[150px] mb-6 font-medium leading-relaxed"></p>
                <button onclick="closeModal('subjectModal')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">닫기</button>
            </div>
            
            <div id="subjectEditArea" class="hidden">
                <textarea id="subjectRangeInput" class="w-full p-4 rounded-xl border border-slate-200 mb-4 min-h-[200px] outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre-wrap" placeholder="시험범위를 입력하세요 (줄바꿈 가능)"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeModal('subjectModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold">취소</button>
                    <button id="saveSubjectBtn" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">저장</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal"><div id="authContent" class="modal-content text-center"><h2 class="text-xl font-bold mb-4 text-slate-900">관리자 로그인</h2><input type="password" id="serialInput" placeholder="인증번호 입력" class="w-full p-4 rounded-2xl border border-slate-200 mb-4 text-center text-xl tracking-widest outline-none focus:ring-2 focus:ring-blue-500 transition-all"><div class="flex gap-2"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold text-slate-500">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">확인</button></div></div></div>
    <div id="errorModal" class="modal" style="z-index: 10001;"><div class="modal-content text-center border-t-8 border-orange-400"><div class="w-16 h-16 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 font-black text-3xl">?</div><h2 class="text-xl font-bold mb-2 text-slate-900">인증번호 오류</h2><p class="text-slate-500 text-sm mb-8 px-4 font-medium">입력하신 번호가 일치하지 않습니다.</p><button onclick="closeModal('errorModal')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">다시 시도</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc",
            authDomain: "hamji-calendar.firebaseapp.com",
            projectId: "hamji-calendar",
            storageBucket: "hamji-calendar.firebasestorage.app",
            messagingSenderId: "28553121023",
            appId: "1:28553121023:web:4fa03b998a1469408510ca",
            measurementId: "G-E4CPF0REFB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const subjectCol = collection(db, "test_ranges");

        const subjects = ["국어", "수학", "영어", "한국사", "통합과학", "통합사회", "물리학", "화학", "생명과학", "지구과학", "정보"];
        let subjectData = {};

        // 리스트 토글
        window.toggleSubjectList = () => {
            const list = document.getElementById('subjectList');
            list.classList.toggle('hidden');
        };

        // 과목 리스트 생성 및 렌더링
        const renderSubjects = () => {
            const container = document.getElementById('subjectList');
            container.innerHTML = "";
            subjects.forEach(sub => {
                const card = document.createElement('div');
                card.className = "subject-card bg-white p-4 rounded-2xl text-center font-bold text-slate-700 shadow-sm cursor-pointer";
                card.innerText = sub;
                
                // 터치/클릭 (조회)
                card.onclick = () => openSubjectDetail(sub);
                
                // 우클릭/홀드 (편집 - 관리자 모드 전용)
                card.oncontextmenu = (e) => {
                    if(!document.body.classList.contains('admin-mode')) return;
                    e.preventDefault();
                    openSubjectEdit(sub);
                };
                
                container.appendChild(card);
            });
        };

        // 과목 상세 보기
        window.openSubjectDetail = (name) => {
            document.getElementById('subjectModalTitle').innerText = name;
            document.getElementById('subjectRangeText').innerText = subjectData[name] || "등록된 시험 범위가 없습니다.";
            document.getElementById('subjectViewArea').classList.remove('hidden');
            document.getElementById('subjectEditArea').classList.add('hidden');
            openModal('subjectModal');
        };

        // 과목 편집 창 (관리자 전용)
        window.openSubjectEdit = (name) => {
            document.getElementById('subjectModalTitle').innerText = `${name} 편집`;
            document.getElementById('subjectRangeInput').value = subjectData[name] || "";
            document.getElementById('subjectViewArea').classList.add('hidden');
            document.getElementById('subjectEditArea').classList.remove('hidden');
            
            document.getElementById('saveSubjectBtn').onclick = async () => {
                const newRange = document.getElementById('subjectRangeInput').value;
                await setDoc(doc(db, "test_ranges", name), { range: newRange });
                closeModal('subjectModal');
            };
            openModal('subjectModal');
        };

        // 실시간 데이터 감시
        onSnapshot(subjectCol, (snapshot) => {
            snapshot.docs.forEach(doc => {
                subjectData[doc.id] = doc.data().range;
            });
            renderSubjects();
        });

        // 공통 함수들 유지
        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.handleAuth = () => {
            if(document.getElementById('serialInput').value === "0307") {
                document.body.classList.add('admin-mode');
                document.getElementById('authBtn').innerText = "관리 모드 ✅";
                closeModal('authModal');
            } else {
                openModal('errorModal');
            }
        };

        // 초기 실행
        renderSubjects();
        
        // ... 기존 캘린더 로직 (fullcalendar 설정 등) 동일하게 아래에 배치 ...
    </script>
</body>
</html>
