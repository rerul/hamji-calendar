<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 서비스</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        #calendar { max-width: 950px; margin: 20px auto; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* [모바일 최적화: 일정 스타일] */
        .fc-event { 
            cursor: pointer; border: none !important; 
            padding: 6px 10px !important; /* 모바일 대응 패딩 확대 */
            font-size: 0.9em; border-radius: 10px !important; 
            font-weight: 700; color: white !important; 
            margin-bottom: 3px; display: block !important; opacity: 1 !important; 
        }
        .fc-event-time { display: none !important; }

        /* [모바일 최적화: 버튼 및 입력창] */
        input, select, textarea { 
            font-size: 16px !important; /* 모바일 Safari 자동 줌 방지 최소 크기 */
            padding: 14px !important; 
            border-radius: 16px !important; 
        }
        button { 
            padding-top: 14px !important; 
            padding-bottom: 14px !important; 
            border-radius: 18px !important; 
            font-size: 1.05rem !important;
        }

        /* 시험범위 과목 카드 크기 조정 */
        .subject-card { 
            background: white; border-radius: 20px; 
            padding: 20px; margin-bottom: 12px; 
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); 
            border: 1px solid #f1f5f9; cursor: pointer; 
        }

        /* 모달 레이아웃 최적화 */
        .modal-content { 
            background: white; margin: 10% auto; 
            padding: 28px; border-radius: 28px; 
            width: 94%; max-width: 480px; 
        }

        .event-item { 
            padding: 18px !important; 
            border-radius: 20px !important; 
            border-left-width: 6px !important; 
        }

        @media (max-width: 768px) {
            .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 800; }
            .fc-button { padding: 8px 12px !important; font-size: 0.85rem !important; }
        }

        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-200 p-5 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600 tracking-tight">📅 함지 3-7</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-5 py-2.5 rounded-xl text-sm font-bold transition-all">관리자</button>
    </nav>

    <div id="calendar"></div>

    <div class="max-w-[950px] mx-auto px-4 mb-6">
        <button onclick="toggleSubjectList()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-blue-100 flex items-center justify-center gap-2 active:scale-[0.97] transition-all">
            📖 시험범위 조회
        </button>
        <div id="subjectListArea" class="hidden mt-4">
            <div id="subjectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="authModal" class="modal"><div id="authContent" class="modal-content text-center"><h2 class="text-xl font-bold mb-5 text-slate-900">관리자 로그인</h2><input type="password" id="serialInput" placeholder="인증번호 입력" class="w-full mb-5 text-center text-2xl tracking-widest outline-none focus:ring-2 focus:ring-blue-500 border border-slate-200"><div class="flex gap-3"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 font-bold text-slate-500">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white font-bold">확인</button></div></div></div>
    
    <div id="editEventModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-black text-slate-900 mb-6 tracking-tight">일정 수정</h2>
            <div class="space-y-4">
                <input type="text" id="editEventTitle" class="w-full border border-slate-200 outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-3">
                    <select id="editEventType" onchange="toggleEditTimeInput()" class="border border-slate-200 bg-white">
                        <option value="1">🔵 일반 행사</option>
                        <option value="2">🔴 마감 기한</option>
                    </select>
                    <input type="date" id="editEventDate" class="border border-slate-200">
                </div>
                <div id="editTimeInputGroup" style="display:none;">
                    <input type="time" id="editEventTime" class="w-full border border-slate-200">
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="closeModal('editEventModal')" class="flex-1 bg-slate-100 font-bold">취소</button>
                <button id="updateEventBtn" class="flex-1 bg-blue-600 text-white font-bold">수정 완료</button>
            </div>
        </div>
    </div>

    <div id="editRangeModal" class="modal">
        <div class="modal-content">
            <h2 id="editSubjectTitle" class="text-2xl font-black text-slate-900 mb-4">과목명</h2>
            <textarea id="rangeInput" class="w-full h-64 border border-slate-200 outline-none focus:border-blue-500 leading-relaxed" placeholder="시험 범위를 입력하세요..."></textarea>
            <div class="mt-6 flex gap-3">
                <button onclick="closeModal('editRangeModal')" class="flex-1 bg-slate-100 font-bold">취소</button>
                <button id="saveRangeBtn" class="flex-1 bg-blue-600 text-white font-bold">저장</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewModal')" class="absolute top-6 right-6 text-slate-400 text-2xl">✕</button><h2 id="viewDateTitle" class="text-base font-bold text-slate-400 mb-1">날짜</h2><h3 class="text-2xl font-black text-slate-900 mb-8 uppercase">상세 일정</h3><div id="eventList" class="space-y-4 max-h-[50vh] overflow-y-auto"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase 설정 (기존과 동일)
        const firebaseConfig = { apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc", authDomain: "hamji-calendar.firebaseapp.com", projectId: "hamji-calendar", storageBucket: "hamji-calendar.firebasestorage.app", messagingSenderId: "28553121023", appId: "1:28553121023:web:4fa03b998a1469408510ca", measurementId: "G-E4CPF0REFB" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");
        const rangeCol = collection(db, "test_ranges");

        const MASTER_SERIAL = "0307";
        const SUBJECTS = ["국어", "수학", "영어", "한국사", "통합과학", "통합사회", "기술가정", "정보"];
        let allEvents = [];
        let rangeData = {};

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // 시험범위 리스트 토글
        window.toggleSubjectList = () => {
            const area = document.getElementById('subjectListArea');
            area.classList.toggle('hidden');
            if(!area.classList.contains('hidden')) area.scrollIntoView({ behavior: 'smooth' });
        };

        // 과목 렌더링 (수정/홀드 로직 포함)
        function renderSubjects() {
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = "";
            SUBJECTS.forEach(sub => {
                const card = document.createElement('div');
                card.className = "subject-card flex justify-between items-center";
                card.innerHTML = `<span class="text-xl font-bold text-slate-800">${sub}</span><span class="text-sm font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-xl">조회</span>`;
                
                card.onclick = () => {
                    // (조회 모달 로직은 생략 - 이전과 동일하게 유지 필요)
                    // 여기에 조회 모달 호출 코드 삽입...
                };

                const handleEdit = (e) => {
                    if(!document.body.classList.contains('admin-mode')) return;
                    e.preventDefault();
                    document.getElementById('editSubjectTitle').innerText = `${sub} 범위 수정`;
                    document.getElementById('rangeInput').value = rangeData[sub] || "";
                    document.getElementById('saveRangeBtn').onclick = async () => {
                        await setDoc(doc(db, "test_ranges", sub), { content: document.getElementById('rangeInput').value });
                        closeModal('editRangeModal');
                    };
                    openModal('editRangeModal');
                };
                card.oncontextmenu = handleEdit;
                let t; card.ontouchstart = () => t = setTimeout(() => handleEdit(new Event('h')), 600); card.ontouchend = () => clearTimeout(t);
                grid.appendChild(card);
            });
        }

        // 일정 수정 로직
        window.openEditModal = (ev) => {
            if(!document.body.classList.contains('admin-mode')) return;
            document.getElementById('editEventTitle').value = ev.rawTitle || ev.title;
            document.getElementById('editEventType').value = ev.type;
            document.getElementById('editEventDate').value = ev.start.split('T')[0];
            document.getElementById('editEventTime').value = ev.time || "";
            window.toggleEditTimeInput();
            document.getElementById('updateEventBtn').onclick = async () => {
                const nt = document.getElementById('editEventTitle').value;
                const ny = document.getElementById('editEventType').value;
                const nd = document.getElementById('editEventDate').value;
                const nm = document.getElementById('editEventTime').value;
                let data = { rawTitle: nt, title: nt, type: ny, start: nd, time: nm, allDay: ny !== "2", backgroundColor: ny === "2" ? "#ef4444" : "#3b82f6" };
                if(ny === "2" && nm) data.start = `${nd}T${nm}:00`;
                await updateDoc(doc(db, "events", ev.id), data);
                closeModal('editEventModal');
                closeModal('viewModal');
            };
            openModal('editEventModal');
        };

        // ... (나머지 캘린더 초기화 및 상세 아이템 렌더링 로직은 이전과 동일하게 유지)
        // (단, renderEventItems 내에서 수정 모달 연결 로직이 포함되어야 함)
    </script>
</body>
</html>
