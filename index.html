<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 일정</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        #calendar { max-width: 950px; margin: 10px auto; padding: 5px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* 공통 스타일 */
        .fc-daygrid-event { cursor: pointer; border: none !important; padding: 2px 4px !important; font-size: 0.75em !important; border-radius: 4px !important; margin-bottom: 1px; }

        /* --- v1.11 모바일 초소형화 (768px 미만) --- */
        @media (max-width: 767px) {
            /* 1. 상단 툴바(제목 + 버튼) 전체 높이 축소 */
            .fc .fc-toolbar { margin-bottom: 0.5rem !important; flex-direction: column; gap: 5px; }
            .fc .fc-toolbar-title { font-size: 0.95rem !important; font-weight: 800 !important; }
            
            /* 2. 버튼 크기 최소화 (오늘, <, >, month, list) */
            .fc .fc-button { 
                padding: 2px 5px !important; 
                font-size: 0.65rem !important; 
                height: 24px !important; 
                line-height: 1 !important;
            }
            .fc-toolbar-chunk { display: flex; gap: 2px !important; }

            /* 3. +N more (더보기) 링크 - 아주 작게 */
            .fc-daygrid-more-link { 
                font-size: 0.6rem !important; 
                padding: 0 !important; 
                margin: 0 !important;
                line-height: 1 !important;
                color: #94a3b8 !important;
            }
            
            /* 4. 날짜 숫자 및 요일 폰트 축소 */
            .fc .fc-daygrid-day-number { font-size: 0.65rem !important; padding: 2px 4px !important; }
            .fc-col-header-cell-cushion { font-size: 0.65rem !important; padding: 2px !important; }
            
            /* 5. 달력 내부 칸 높이 조절 */
            .fc .fc-daygrid-day-frame { min-height: 40px !important; }
            
            /* 6. 이벤트 텍스트 크기 극소화 */
            .fc-event-title { font-size: 0.7rem !important; }
        }

        /* 상세 페이지 모달 관련 (기존 유지) */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 12% auto; padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; animation: modal-in 0.25s ease-out; }
        @keyframes modal-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .event-display-img { width: 100%; border-radius: 16px; object-fit: contain; max-height: 300px; border: 1px solid #f1f5f9; background: #fff; margin-top: 10px; }
        .download-btn { width: 100%; margin-top: 8px; padding: 10px; background: #f1f5f9; color: #475569; border-radius: 12px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600">📅 함지 3-7 일정 </h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold">관리자 인증</button>
    </nav>

    <div class="px-2 mt-2 text-center">
        <div id="calendar"></div>
        <div class="max-w-[950px] mx-auto px-2 mb-4">
            <button onclick="toggleSubjectList()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold text-md shadow-lg shadow-blue-100">📖 시험범위 조회</button>
        </div>
        <div id="subjectListArea" class="hidden"><div id="subjectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 px-2"></div></div>
    </div>

    <div id="viewModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewModal')" class="absolute top-4 right-4 p-2 text-slate-400 text-2xl">✕</button><h2 id="viewDateTitle" class="text-lg font-bold text-slate-400 mb-1">날짜</h2><h3 class="text-2xl font-black text-slate-900 mb-6">상세 일정</h3><div id="eventList" class="space-y-3 max-h-[400px] overflow-y-auto"></div></div></div>
    
    <div id="addModal" class="modal"><div class="modal-content"><h2 id="modalTitle" class="text-xl font-bold mb-5 text-center">일정 편집</h2><div class="space-y-4">
        <input type="text" id="eventTitle" placeholder="일정 이름" class="w-full p-3 rounded-xl border border-slate-200">
        <div class="grid grid-cols-2 gap-2">
            <select id="eventType" onchange="toggleTimeInput()" class="p-3 rounded-xl border border-slate-200"><option value="1">🔵 행사</option><option value="2">🔴 마감</option></select>
            <input type="date" id="eventDate" class="p-3 rounded-xl border border-slate-200">
        </div>
        <div id="timeInputGroup" style="display:none;"><input type="time" id="eventTime" class="w-full p-3 rounded-xl border border-slate-200"></div>
        <textarea id="eventDescription" placeholder="상세 설명" class="w-full h-20 p-3 rounded-xl border border-slate-200 text-sm"></textarea>
        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
        <button onclick="document.getElementById('imageInput').click()" class="w-full py-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 text-xs font-bold">📷 사진 첨부</button>
        <div id="fileInfoContainer" class="hidden p-2 bg-slate-50 rounded-lg text-[10px] flex justify-between items-center"><span id="fileName">파일없음</span><button onclick="removeSelectedImage()" class="text-red-500 font-bold">삭제</button></div>
    </div><div class="mt-6 flex gap-2"><button onclick="closeModal('addModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">취소</button><button id="saveEventBtn" onclick="handleSaveEvent()" class="flex-2 bg-blue-600 text-white p-3 rounded-xl font-bold">저장</button></div></div></div>

    <div id="authModal" class="modal"><div class="modal-content text-center"><h2 class="text-xl font-bold mb-4">관리자 로그인</h2><input type="password" id="serialInput" class="w-full p-4 rounded-2xl border mb-4 text-center"><div class="flex gap-2"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl">확인</button></div></div></div>
    <div id="editRangeModal" class="modal"><div class="modal-content"><h2 id="editSubjectTitle" class="text-xl font-bold mb-4">과목 수정</h2><textarea id="rangeInput" class="w-full h-40 p-4 border rounded-xl"></textarea><div class="flex gap-2 mt-4"><button onclick="closeModal('editRangeModal')" class="flex-1 bg-slate-100 p-4 rounded-xl">취소</button><button id="saveRangeBtn" class="flex-1 bg-blue-600 text-white p-4 rounded-xl">저장</button></div></div></div>
    <div id="viewRangeModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewRangeModal')" class="absolute top-4 right-4 text-2xl">✕</button><h2 id="targetSubjectName" class="text-2xl font-black mb-4">과목명</h2><div id="rangeDisplay" class="bg-slate-50 p-6 rounded-2xl whitespace-pre-wrap"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc", authDomain: "hamji-calendar.firebaseapp.com", projectId: "hamji-calendar", storageBucket: "hamji-calendar.firebasestorage.app", messagingSenderId: "28553121023", appId: "1:28553121023:web:4fa03b998a1469408510ca", measurementId: "G-E4CPF0REFB" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");
        const rangeCol = collection(db, "test_ranges");

        const MASTER_SERIAL = "0307";
        const SUBJECTS = ["화법과 작문", "영어", "심화수학", "미적분", "수학적 사고와 통계", "물리학II", "화학II", "생명과학II", "지구과학II"];
        const CLOUD_NAME = "djnh3tcdq";
        const UPLOAD_PRESET = "hamji-calendar";

        let rangeData = {}; let allEvents = []; let currentEditId = null; let selectedFile = null; let currentImageUrl = "";

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'addModal') { currentEditId = null; selectedFile = null; currentImageUrl = ""; document.getElementById('fileInfoContainer').classList.add('hidden'); }
        };

        window.downloadImage = async (url, title) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = `${title}.jpg`;
                a.click();
            } catch (e) { alert("다운로드 실패"); }
        };

        window.handleFileSelect = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('fileInfoContainer').classList.remove('hidden');
            }
        };

        window.removeSelectedImage = () => { selectedFile = null; currentImageUrl = ""; document.getElementById('fileInfoContainer').classList.add('hidden'); };

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        window.toggleSubjectList = () => document.getElementById('subjectListArea').classList.toggle('hidden');

        function renderSubjects() {
            const grid = document.getElementById('subjectGrid'); grid.innerHTML = "";
            SUBJECTS.forEach(sub => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border flex justify-between items-center mb-1";
                card.innerHTML = `<span class="font-bold">${sub}</span><span class="text-xs text-blue-500">조회</span>`;
                card.onclick = () => { document.getElementById('targetSubjectName').innerText = sub; document.getElementById('rangeDisplay').innerText = rangeData[sub] || "범위 없음"; openModal('viewRangeModal'); };
                card.oncontextmenu = (e) => { 
                    if(!document.body.classList.contains('admin-mode')) return; 
                    e.preventDefault(); document.getElementById('editSubjectTitle').innerText = sub;
                    document.getElementById('rangeInput').value = rangeData[sub] || "";
                    document.getElementById('saveRangeBtn').onclick = async () => { await setDoc(doc(db, "test_ranges", sub), { content: document.getElementById('rangeInput').value }); closeModal('editRangeModal'); };
                    openModal('editRangeModal');
                };
                grid.appendChild(card);
            });
        }

        onSnapshot(rangeCol, (snap) => { snap.docs.forEach(d => rangeData[d.id] = d.data().content); renderSubjects(); });

        window.handleAuth = () => {
            if(document.getElementById('serialInput').value === MASTER_SERIAL) {
                document.body.classList.add('admin-mode');
                document.getElementById('authBtn').innerText = "관리 모드 ✅";
                closeModal('authModal');
            }
        };

        window.toggleTimeInput = () => { document.getElementById('timeInputGroup').style.display = document.getElementById('eventType').value === "2" ? "block" : "none"; };

        window.prepareEdit = (ev) => {
            if(!document.body.classList.contains('admin-mode')) return;
            currentEditId = ev.id;
            document.getElementById('eventTitle').value = ev.rawTitle || ev.title;
            document.getElementById('eventType').value = ev.type;
            document.getElementById('eventDate').value = ev.start.split('T')[0];
            document.getElementById('eventDescription').value = ev.description || "";
            if(ev.imageUrl) { currentImageUrl = ev.imageUrl; document.getElementById('fileName').innerText = "기존 이미지 있음"; document.getElementById('fileInfoContainer').classList.remove('hidden'); }
            toggleTimeInput(); openModal('addModal');
        };

        window.handleSaveEvent = async () => {
            const btn = document.getElementById('saveEventBtn');
            btn.disabled = true;
            try {
                let imageUrl = currentImageUrl;
                if(selectedFile) imageUrl = await uploadToCloudinary(selectedFile);
                const data = {
                    title: document.getElementById('eventTitle').value,
                    rawTitle: document.getElementById('eventTitle').value,
                    start: document.getElementById('eventDate').value,
                    type: document.getElementById('eventType').value,
                    description: document.getElementById('eventDescription').value,
                    imageUrl: imageUrl || "",
                    backgroundColor: document.getElementById('eventType').value === "2" ? "#ef4444" : "#3b82f6"
                };
                if(currentEditId) await updateDoc(doc(db, "events", currentEditId), data);
                else await addDoc(eventCol, data);
                closeModal('addModal');
            } catch (e) { alert("저장 실패"); }
            finally { btn.disabled = false; }
        };

        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                dayMaxEvents: 2, // 모바일에서 칸이 커지지 않도록 최대 2개만 표시
                dateClick: (info) => {
                    const dateStr = info.dateStr;
                    document.getElementById('viewDateTitle').innerText = dateStr;
                    const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
                    const listEl = document.getElementById('eventList');
                    listEl.innerHTML = dayEvents.length ? "" : "<p class='text-center py-10'>일정 없음</p>";
                    dayEvents.forEach(ev => {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-slate-50 rounded-2xl mb-2";
                        const imgHtml = ev.imageUrl ? `<img src="${ev.imageUrl}" class="event-display-img"><button onclick="downloadImage('${ev.imageUrl}', '${ev.title}')" class="download-btn">📥 저장</button>` : "";
                        item.innerHTML = `<div><h4 class="font-bold">${ev.title}</h4><p class="text-xs text-slate-400">${ev.description || ''}</p>${imgHtml}</div>`;
                        item.oncontextmenu = (e) => { e.preventDefault(); prepareEdit(ev); };
                        listEl.appendChild(item);
                    });
                    openModal('viewModal');
                },
                eventClick: (info) => { info.jsEvent.preventDefault(); calendar.trigger('dateClick', { dateStr: info.event.startStr.split('T')[0] }); }
            });
            calendar.render();
            onSnapshot(eventCol, (snap) => { allEvents = snap.docs.map(d => ({id:d.id, ...d.data()})); calendar.removeAllEvents(); calendar.addEventSource(allEvents); });
        });
    </script>
</body>
</html>
