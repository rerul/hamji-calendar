<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함지 3-7 일정</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />

    <style>
        body { font-family: 'Pretendard', sans-serif; }
        #calendar { max-width: 950px; margin: 20px auto; padding: 15px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .fc-event { cursor: pointer; border: none !important; padding: 4px 6px; font-size: 0.85em; border-radius: 6px; transition: transform 0.1s; }
        .fc-event:hover { transform: scale(1.02); }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        
        /* 모달 스타일 애니메이션 */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 28px; border-radius: 20px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        input, select { transition: all 0.2s; border: 1px solid #e2e8f0; }
        input:focus, select:focus { border-color: #3b82f6; ring: 2px; ring-color: #bfdbfe; outline: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600 tracking-tight">📅 함지 3-7 일정</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-all">관리자 인증</button>
    </nav>

    <div id="calendar"></div>

    <div id="authModal" class="modal">
        <div class="modal-content text-center">
            <h2 class="text-2xl font-bold mb-2">관리자 로그인</h2>
            <p class="text-slate-500 text-sm mb-6">일련번호를 입력하여 편집 권한을 얻으세요.</p>
            <input type="password" id="serialInput" placeholder="Secret Code" class="w-full p-3 rounded-xl mb-4 text-center text-lg tracking-widest">
            <div class="flex gap-2">
                <button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">닫기</button>
                <button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">인증</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-slate-900">새 일정 만들기</h2>
                <button onclick="closeModal('addModal')" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">일정 내용</label>
                    <input type="text" id="eventTitle" placeholder="어떤 일정인가요?" class="w-full p-3 rounded-xl">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">유형</label>
                        <select id="eventType" onchange="toggleTimeInput()" class="w-full p-3 rounded-xl bg-white cursor-pointer">
                            <option value="1">🔵 행사/일반</option>
                            <option value="2">🔴 마감/커트라인</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">날짜</label>
                        <input type="date" id="eventDate" class="w-full p-3 rounded-xl">
                    </div>
                </div>

                <div id="timeInputGroup" style="display:none;">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">마감 시간 (시:분)</label>
                    <input type="time" id="eventTime" class="w-full p-3 rounded-xl">
                </div>
            </div>

            <div class="mt-8 flex gap-2">
                <button onclick="closeModal('addModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold hover:bg-slate-200 transition">취소</button>
                <button onclick="handleAddEvent()" class="flex-2 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">일정 저장하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc",
            authDomain: "hamji-calendar.firebaseapp.com",
            projectId: "hamji-calendar",
            storageBucket: "hamji-calendar.firebasestorage.app",
            messagingSenderId: "28553121023",
            appId: "1:28553121023:web:4fa03b998a1469408510ca",
            measurementId: "G-E4CPF0REFB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");

        const MASTER_SERIAL = "1234"; // 👈 여기를 실제 비밀번호로 변경하세요!

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
            if(id === 'addModal') document.getElementById('eventTitle').value = "";
        }
        window.toggleTimeInput = () => {
            const type = document.getElementById('eventType').value;
            document.getElementById('timeInputGroup').style.display = type === "2" ? "block" : "none";
        };

        window.handleAuth = () => {
            const val = document.getElementById('serialInput').value;
            if(val === MASTER_SERIAL) {
                document.body.classList.add('admin-mode');
                document.getElementById('authBtn').innerText = "관리자 인증됨 ✅";
                document.getElementById('authBtn').classList.replace('bg-slate-100', 'bg-green-100');
                closeModal('authModal');
            } else {
                alert("인증 번호가 다릅니다.");
            }
        };

        window.handleAddEvent = async () => {
            const title = document.getElementById('eventTitle').value;
            const type = document.getElementById('eventType').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;

            if(!title || !date) return alert("내용과 날짜를 확인해주세요.");

            let eventData = { title, start: date, allDay: true, backgroundColor: '#3b82f6', borderColor: 'transparent' };

            if(type === "2" && time) {
                eventData.title = `~${time} ${title}`;
                eventData.allDay = false;
                eventData.start = `${date}T${time}:00`;
                eventData.backgroundColor = '#ef4444';
            }

            await addDoc(eventCol, eventData);
            closeModal('addModal');
        };

        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                selectable: true, // 👈 날짜 클릭/드래그 활성화
                dayMaxEvents: true,
                
                // [날짜 클릭 시 동작]
                dateClick: function(info) {
                    if(!document.body.classList.contains('admin-mode')) {
                        return; // 관리자가 아니면 무시
                    }
                    document.getElementById('eventDate').value = info.dateStr; // 클릭한 날짜 자동 입력
                    openModal('addModal');
                },

                eventDidMount: (info) => {
                    tippy(info.el, { content: `<strong>${info.event.title}</strong>`, allowHTML: true, theme: 'light' });
                },

                eventClick: (info) => {
                    if(document.body.classList.contains('admin-mode')) {
                        if(confirm(`[삭제] "${info.event.title}" 일정을 삭제할까요?`)) {
                            deleteDoc(doc(db, "events", info.event.id));
                        }
                    }
                }
            });
            calendar.render();

            onSnapshot(eventCol, (snapshot) => {
                const events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            });
        });
    </script>
</body>
</html>
