<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>함지 3-7 일정 & 시험범위</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* [핵심] 달력 컨테이너: 화면을 벗어나지 않도록 설정 */
        #calendar { 
            max-width: 950px; 
            margin: 10px auto; 
            padding: 5px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%; 
            box-sizing: border-box;
        }

        /* [모바일 헤더 정렬] */
        @media (max-width: 768px) {
            .fc .fc-toolbar {
                display: flex;
                flex-direction: column; /* 세로 정렬로 겹침 방지 */
                gap: 8px;
                margin-bottom: 1em !important;
            }
            .fc .fc-toolbar-title { font-size: 1.2rem !important; }
            .fc .fc-button { padding: 0.4em 0.6em !important; font-size: 0.85rem !important; }
            
            /* 달력 내부 숫자 크기 조절하여 드래그 발생 억제 */
            .fc .fc-daygrid-day-number { font-size: 0.8rem; padding: 2px !important; }
        }

        /* [+1 more 위치 교정] */
        .fc-daygrid-more-link {
            display: block !important;
            margin-top: -2px !important; /* 위로 살짝 올림 */
            padding: 1px 4px !important;
            font-size: 0.7rem !important;
            font-weight: 800;
            color: #64748b !important;
            text-align: center;
        }

        .fc-daygrid-day { -webkit-user-select: none; user-select: none; }
        .fc-daygrid-event { cursor: pointer; border: none !important; padding: 2px 4px !important; font-size: 0.75rem; border-radius: 4px !important; font-weight: 600; color: white !important; margin-bottom: 1px; display: block !important; }
        .fc-event-time { display: none !important; }
        .fc-event-title { color: white !important; font-weight: 700 !important; }
        
        /* 시험범위 영역 */
        #subjectGrid { max-width: 950px; margin: 0 auto; }
        .subject-card { 
            background: white; 
            border-radius: 16px; 
            padding: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            border: 1px solid #f1f5f9; 
            cursor: pointer; 
            width: 100%; 
        }
        
        @media (min-width: 768px) {
            .subject-card { max-width: 467px; }
            .fc .fc-toolbar { flex-direction: row; justify-content: space-between; } /* PC에선 가로 정렬 */
        }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 12% auto; padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; animation: modal-in 0.25s ease-out; }
        @keyframes modal-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; }

        #fileInfoContainer { display: none; margin-top: 8px; padding: 12px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; align-items: center; justify-content: space-between; }
        .event-image-container { margin-top: 16px; position: relative; width: 100%; }
        .event-display-img { width: 100%; border-radius: 16px; object-fit: contain; max-height: 300px; border: 1px solid #f1f5f9; background: #fff; }
        .download-btn { width: 100%; margin-top: 8px; padding: 12px 0; background: #f1f5f9; color: #475569; border-radius: 12px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center px-6 md:px-12 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold text-blue-600">📅 함지 3-7 서비스</h1>
        <button id="authBtn" onclick="openModal('authModal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-all">관리자 인증</button>
    </nav>

    <div class="px-2 mt-2 text-center">
        <div id="calendar"></div>
        <div class="max-w-[950px] mx-auto px-2 mb-4">
            <button onclick="toggleSubjectList()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-100 flex items-center justify-center gap-2 active:scale-[0.99] transition-all">📖 시험범위 조회</button>
        </div>
        <div id="subjectListArea" class="px-2 hidden mt-6">
            <div id="subjectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-y-3 md:gap-x-4"></div>
        </div>
    </div>

    <div id="viewModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewModal')" class="absolute top-4 right-4 p-2 text-slate-400 text-2xl">✕</button><h2 id="viewDateTitle" class="text-lg font-bold text-slate-400 mb-1">날짜</h2><h3 class="text-2xl font-black text-slate-900 mb-6 uppercase">상세 일정</h3><div id="eventList" class="space-y-3 max-h-[400px] overflow-y-auto pr-1"></div></div></div>
    <div id="addModal" class="modal"><div class="modal-content"><h2 id="modalTitle" class="text-xl font-bold text-slate-900 mb-5 tracking-tight text-center">새 일정 만들기</h2><div class="space-y-4">
        <input type="text" id="eventTitle" placeholder="일정 이름" class="w-full p-3 rounded-xl border border-slate-200 outline-none">
        <div class="grid grid-cols-2 gap-2">
            <select id="eventType" onchange="toggleTimeInput()" class="p-3 rounded-xl border border-slate-200 bg-white font-bold"><option value="1">🔵 일반 행사</option><option value="2">🔴 마감 기한</option></select>
            <input type="date" id="eventDate" class="p-3 rounded-xl border border-slate-200">
        </div>
        <div id="timeInputGroup" style="display:none;"><input type="time" id="eventTime" class="w-full p-3 rounded-xl border border-slate-200 font-bold"></div>
        <textarea id="eventDescription" placeholder="상세 설명" class="w-full h-20 p-3 rounded-xl border border-slate-200 text-sm"></textarea>
        <div class="mt-1"><input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)"><button onclick="document.getElementById('imageInput').click()" class="w-full py-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 text-xs font-extrabold">📷 사진 첨부</button>
        <div id="fileInfoContainer" class="flex"><div class="flex flex-col overflow-hidden mr-2"><span id="fileName" class="text-[11px] font-bold text-slate-700 truncate">파일명</span><span id="fileSize" class="text-[9px] text-blue-500 font-black uppercase">0.0 MB</span></div><button onclick="removeSelectedImage()" class="shrink-0 bg-slate-200 text-slate-600 rounded-lg p-1 px-2 text-[10px] font-black">삭제</button></div></div>
    </div><div class="mt-6 flex gap-2"><button onclick="closeModal('addModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold text-slate-500">취소</button><button id="saveEventBtn" onclick="handleSaveEvent()" class="flex-2 bg-blue-600 text-white p-3 rounded-xl font-bold"><span id="btnText">저장</span></button></div></div></div>
    
    <div id="viewRangeModal" class="modal"><div class="modal-content"><button onclick="closeModal('viewRangeModal')" class="absolute top-4 right-4 p-2 text-slate-400 text-2xl">✕</button><h2 id="targetSubjectName" class="text-2xl font-black text-slate-900 mb-6">과목명</h2><div id="rangeDisplay" class="bg-slate-50 p-6 rounded-2xl min-h-[150px] whitespace-pre-wrap leading-relaxed"></div></div></div>
    <div id="authModal" class="modal"><div class="modal-content text-center"><h2 class="text-xl font-bold mb-4">관리자 로그인</h2><input type="password" id="serialInput" class="w-full p-4 rounded-2xl border mb-4 text-center text-xl tracking-widest"><div class="flex gap-2"><button onclick="closeModal('authModal')" class="flex-1 bg-slate-100 p-4 rounded-2xl">닫기</button><button onclick="handleAuth()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl">확인</button></div></div></div>
    <div id="editRangeModal" class="modal"><div class="modal-content"><h2 id="editSubjectTitle" class="text-xl font-black text-slate-900 mb-4">과목명</h2><textarea id="rangeInput" class="w-full h-48 p-4 rounded-xl border border-slate-200 outline-none"></textarea><div class="mt-6 flex gap-2"><button onclick="closeModal('editRangeModal')" class="flex-1 bg-slate-100 p-4 rounded-xl font-bold">취소</button><button id="saveRangeBtn" class="flex-2 bg-blue-600 text-white p-4 rounded-xl font-bold">저장</button></div></div></div>
    <div id="confirmDeleteModal" class="modal"><div class="modal-content text-center"><h2 class="text-xl font-bold mb-8">삭제할까요?</h2><div class="flex gap-2"><button onclick="closeModal('confirmDeleteModal')" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">유지</button><button id="finalDeleteBtn" class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold">삭제</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuB5fDjAqs0vyKDj8qnKgRYe5Er9-Fogc", authDomain: "hamji-calendar.firebaseapp.com", projectId: "hamji-calendar", storageBucket: "hamji-calendar.firebasestorage.app", messagingSenderId: "28553121023", appId: "1:28553121023:web:4fa03b998a1469408510ca", measurementId: "G-E4CPF0REFB" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventCol = collection(db, "events");
        const rangeCol = collection(db, "test_ranges");

        const MASTER_SERIAL = "0307";
        const SUBJECTS = ["화법과 작문", "영어", "심화수학", "미적분", "수학적 사고와 통계", "물리학II", "화학II", "생명과학II", "지구과학II"];
        const CLOUD_NAME = "djnh3tcdq";
        const UPLOAD_PRESET = "hamji-calendar";

        let rangeData = {};
        let allEvents = [];
        let currentEditId = null;
        let selectedFile = null;
        let currentImageUrl = "";

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'addModal') { 
                currentEditId = null; selectedFile = null; currentImageUrl = "";
                document.getElementById('fileInfoContainer').style.display = 'none';
            } 
        };

        window.handleFileSelect = (event) => {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('fileSize').innerText = `${(file.size / (1024 * 1024)).toFixed(2)} MB • 첨부됨`;
                document.getElementById('fileInfoContainer').style.display = 'flex';
            }
        };

        window.removeSelectedImage = () => {
            selectedFile = null; currentImageUrl = "";
            document.getElementById('imageInput').value = "";
            document.getElementById('fileInfoContainer').style.display = 'none';
        };

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        window.toggleSubjectList = () => {
            const area = document.getElementById('subjectListArea');
            area.classList.toggle('hidden');
            if(!area.classList.contains('hidden')) area.scrollIntoView({ behavior: 'smooth' });
        };

        function renderSubjects() {
            const grid = document.getElementById('subjectGrid'); grid.innerHTML = "";
            SUBJECTS.forEach(sub => {
                const card = document.createElement('div');
                card.className = "subject-card flex justify-between items-center";
                card.innerHTML = `<span class="text-lg font-bold text-slate-700">${sub}</span><span class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">조회</span>`;
                card.onclick = () => {
                    document.getElementById('targetSubjectName').innerText = sub;
                    document.getElementById('rangeDisplay').innerText = rangeData[sub] || "등록된 범위가 없습니다.";
                    openModal('viewRangeModal');
                };
                const handleLongPress = (e) => {
                    if(!document.body.classList.contains('admin-mode')) return;
                    if(e) e.preventDefault();
                    document.getElementById('editSubjectTitle').innerText = `${sub} 수정`;
                    document.getElementById('rangeInput').value = rangeData[sub] || "";
                    document.getElementById('saveRangeBtn').onclick = () => saveRange(sub);
                    openModal('editRangeModal');
                };
                card.oncontextmenu = handleLongPress;
                let timer;
                card.ontouchstart = () => { timer = setTimeout(() => handleLongPress(), 600); };
                card.ontouchend = () => clearTimeout(timer);
                grid.appendChild(card);
            });
        }

        async function saveRange(subject) {
            const newRange = document.getElementById('rangeInput').value;
            try { await setDoc(doc(db, "test_ranges", subject), { content: newRange }); closeModal('editRangeModal'); } catch (e) { console.error(e); }
        }

        onSnapshot(rangeCol, (snapshot) => { snapshot.docs.forEach(doc => { rangeData[doc.id] = doc.data().content; }); renderSubjects(); });

        window.handleAuth = () => {
            if(document.getElementById('serialInput').value === MASTER_SERIAL) {
                document.body.classList.add('admin-mode');
                document.getElementById('authBtn').innerText = "관리 모드 ✅";
                closeModal('authModal');
                renderSubjects();
            } else { alert("인증번호 오류"); }
        };

        window.toggleTimeInput = () => { document.getElementById('timeInputGroup').style.display = document.getElementById('eventType').value === "2" ? "block" : "none"; };
        
        window.handleSaveEvent = async () => { 
            const title = document.getElementById('eventTitle').value; 
            const date = document.getElementById('eventDate').value; 
            if(!title || !date) return; 

            const btnText = document.getElementById('btnText');
            btnText.innerText = "처리 중...";

            try {
                let imageUrl = currentImageUrl;
                if(selectedFile) { imageUrl = await uploadToCloudinary(selectedFile); }

                let eventData = { 
                    rawTitle: title, title: title, start: date, allDay: document.getElementById('eventType').value !== "2", 
                    type: document.getElementById('eventType').value, time: document.getElementById('eventTime').value || "", 
                    description: document.getElementById('eventDescription').value || "",
                    imageUrl: imageUrl || "",
                    backgroundColor: document.getElementById('eventType').value === "2" ? "#ef4444" : "#3b82f6", textColor: "#ffffff", borderColor: 'transparent' 
                }; 
                if(eventData.type === "2" && eventData.time) eventData.start = `${date}T${eventData.time}:00`; 

                if (currentEditId) { await updateDoc(doc(db, "events", currentEditId), eventData); }
                else { await addDoc(eventCol, eventData); }
                closeModal('addModal');
            } catch (e) { alert("오류 발생"); }
            finally { btnText.innerText = "저장"; }
        };

        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                dayMaxEvents: 2, /* 모바일 높이를 고려하여 이벤트 표시 제한 */
                contentHeight: 'auto',
                handleWindowResize: true,
                dateClick: (info) => {
                    const dateStr = info.dateStr;
                    document.getElementById('viewDateTitle').innerText = dateStr;
                    const dayEvents = allEvents.filter(e => e.start.startsWith(dateStr));
                    const listEl = document.getElementById('eventList');
                    listEl.innerHTML = dayEvents.length ? "" : "<p class='text-center text-slate-400 py-10'>일정이 없습니다.</p>";
                    
                    dayEvents.forEach(ev => {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-slate-50 rounded-2xl mb-2 cursor-pointer";
                        item.innerHTML = `<h4 class="font-bold text-slate-800">${ev.title}</h4>`;
                        item.onclick = () => {
                            if(!document.body.classList.contains('admin-mode')) return;
                            document.getElementById('finalDeleteBtn').onclick = async () => { await deleteDoc(doc(db, "events", ev.id)); closeModal('confirmDeleteModal'); closeModal('viewModal'); }; 
                            openModal('confirmDeleteModal');
                        };
                        listEl.appendChild(item);
                    });
                    openModal('viewModal');
                },
                eventClick: (info) => { info.jsEvent.preventDefault(); calendar.trigger('dateClick', { dateStr: info.event.startStr.split('T')[0] }); }
            });
            calendar.render();

            onSnapshot(eventCol, (snapshot) => { 
                allEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                calendar.removeAllEvents();
                calendar.addEventSource(allEvents.map(ev => ({ ...ev, display: 'block' }))); 
            });
            renderSubjects();
        });
    </script>
</body>
</html>
